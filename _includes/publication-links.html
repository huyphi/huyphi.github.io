{% assign item = include.item %}

{% if item.paperurl or item.pdfurl %}
  <div class="publication-links">

    {% if item.paperurl %}
      <a href="{{ item.paperurl }}" class="publication-link-button" target="_blank" rel="noopener noreferrer" title="Read article online">
        <i class="fa-solid fa-link" aria-hidden="true"></i>
        <span>Article</span>
      </a>
    {% endif %}

    {% if item.pdfurl %}
      <a href="{{ item.pdfurl }}" class="publication-link-button" target="_blank" rel="noopener noreferrer" title="View PDF">
        <i class="fa-solid fa-file-pdf" aria-hidden="true"></i>
        <span>PDF</span>
      </a>
    {% endif %}

  </div>
{% endif %}
